name: Dependabot Automerge

on:
  workflow_run:
    workflows:
      - Lint
      - Test
      - TypeScript Type Check
    types:
      - completed

concurrency:
  group: dependabot-automerge-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.actor.login == 'dependabot[bot]'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Check all CI passed
        id: status
        uses: danieldeichfuss/get-status@v0.0.10
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: Dependabot Automerge

      - name: Enable automerge
        if: |
          steps.status.outputs.all-checks-completed == 'true' &&
          steps.status.outputs.all-checks-passed == 'true'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.workflow_run.pull_requests[0].number }}
          merge-method: squash
