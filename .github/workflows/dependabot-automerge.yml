name: Dependabot Automerge

on:
  workflow_run:
    workflows:
      - Lint
      - Test
      - TypeScript Type Check
    types:
      - completed

concurrency:
  group: dependabot-automerge-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.actor.login == 'dependabot[bot]'
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Check all CI passed
        id: status
        uses: danieldeichfuss/get-status@v0.0.10
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: Dependabot Automerge

      - name: Check pull request file changes
        id: changes
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.workflow_run.pull_requests?.[0];

            if (!pr) {
              core.setOutput('has_workflow_changes', 'false');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const hasWorkflowChanges = files.some((file) =>
              file.filename.startsWith('.github/workflows/')
            );

            core.setOutput('has_workflow_changes', hasWorkflowChanges ? 'true' : 'false');

      - name: Enable automerge
        if: |
          steps.status.outputs.all-checks-completed == 'true' &&
          steps.status.outputs.all-checks-passed == 'true' &&
          steps.changes.outputs.has_workflow_changes == 'false'
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.workflow_run.pull_requests[0].number }}
          merge-method: squash
