name: Examples E2E

on:
  pull_request:
    paths:
      - 'examples/**'
      - 'test/e2e/examples/**'
      - 'playwright.config.js'
      - '.github/workflows/examples-e2e.yml'
  push:
    branches:
      - main
    paths:
      - 'examples/**'
      - 'test/e2e/examples/**'
      - 'playwright.config.js'
      - '.github/workflows/examples-e2e.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-examples-e2e:
    name: Run examples upload e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: package.json
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Build root package
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run upload test for each example
        run: |
          mapfile -t EXAMPLE_PATHS < <(
            node - <<'NODE'
            const { readdirSync, existsSync } = require('node:fs');
            const { join, relative, resolve } = require('node:path');

            const repoRoot = process.cwd();
            const examplesRoot = resolve(repoRoot, 'examples');
            const paths = [];

            for (const language of readdirSync(examplesRoot, { withFileTypes: true })) {
              if (!language.isDirectory()) continue;
              const languagePath = join(examplesRoot, language.name);

              for (const framework of readdirSync(languagePath, { withFileTypes: true })) {
                if (!framework.isDirectory()) continue;
                const frameworkPath = join(languagePath, framework.name);

                for (const tool of readdirSync(frameworkPath, { withFileTypes: true })) {
                  if (!tool.isDirectory()) continue;
                  const examplePath = join(frameworkPath, tool.name);
                  if (!existsSync(join(examplePath, 'package.json'))) continue;
                  paths.push(relative(repoRoot, examplePath).replaceAll('\\', '/'));
                }
              }
            }

            paths.sort((a, b) => a.localeCompare(b));
            process.stdout.write(paths.join('\n'));
            NODE
          )

          failures=()

          for example_path in "${EXAMPLE_PATHS[@]}"; do
            echo "::group::${example_path}"
            (
              cd "${example_path}"
              npm pkg set "dependencies.document-markdown-reader=file:../../../../"
              npm install
            )

            if ! E2E_EXAMPLE_PATH="${example_path}" E2E_BASE_URL="http://127.0.0.1:4173" E2E_PORT="4173" CI="1" npm run test:e2e:examples -- --reporter=line; then
              failures+=("${example_path}")
            fi
            echo "::endgroup::"
          done

          if [ "${#failures[@]}" -gt 0 ]; then
            echo "The following examples failed the upload e2e test:"
            printf '%s\n' "${failures[@]}"
            exit 1
          fi
