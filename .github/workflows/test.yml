name: Test

permissions:
  contents: read

on:
  pull_request:
    paths-ignore:
      - '.gitattributes'
      - '.gitignore'
      - '.editorconfig'
      - '**.md'
      - 'LICENSE'
      - 'examples/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup-matrix:
    name: Setup matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.setup-matrix.outputs.matrix }}
      min_version: ${{ steps.setup-matrix.outputs.min_version }}


    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js matrix
        id: setup-matrix
        run: |
          # Get minimum version from package.json
          MIN_VERSION=$(node -p "require('./package.json').engines.node.replace('>=', '')")

          # Get latest LTS version from Node.js API
          LATEST_VERSION=$(curl -s https://nodejs.org/dist/index.json | jq -r '.[] | select(.lts) | .version' | head -n1 | cut -d'v' -f2)

          # Extract major version from latest LTS
          LATEST_MAJOR_VERSION=$(echo "$LATEST_VERSION" | cut -d'.' -f1)

          # Generate array of major versions from MIN_VERSION to LATEST_MAJOR_VERSION
          VERSIONS=""
          for ((i=MIN_VERSION; i<=LATEST_MAJOR_VERSION; i++)); do
            VERSIONS="$VERSIONS\"$i\","
          done
          # Remove trailing comma and wrap in brackets
          MATRIX="[${VERSIONS%,}]"

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "min_version=$MIN_VERSION" >> $GITHUB_OUTPUT

  test:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        node-version: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    name: Test with Node.js ${{ matrix.node-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Install Rolldown binding for Node.js 21
        if: matrix.node-version == 21
        run: npm install --no-save @rolldown/binding-linux-x64-gnu@$(node -p "require('./node_modules/rolldown/package.json').version")

      - name: Run tests
        run: npm test
        env:
          # Node 21 does not accept util.styleText style arrays, but Vite 8's Rolldown dependency uses them.
          NODE_OPTIONS: ${{ matrix.node-version == 21 && '--import ./test/node21-styletext-polyfill.mjs' || '' }}

  build:
    needs: setup-matrix
    runs-on: ubuntu-latest
    name: Build and verify with Node.js ${{ needs.setup-matrix.outputs.min_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js ${{ needs.setup-matrix.outputs.min_version }}
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ needs.setup-matrix.outputs.min_version }}

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install Playwright browser and system dependencies
        run: npx playwright install --with-deps chromium

      - name: Install Vite example dependencies
        working-directory: examples/javascript/vanilla/vite
        run: |
          npm pkg set "dependencies.@interview-challenge-archive/document-markdown-reader=file:../../../../"
          npm install

      - name: Run browser smoke test (detect util.inherits startup regressions)
        env:
          E2E_EXAMPLE_PATH: examples/javascript/vanilla/vite
          E2E_BASE_URL: http://127.0.0.1:4173
          E2E_PORT: 4173
          CI: '1'
        run: npm run test:e2e:examples -- --browser=chromium --reporter=line

      - name: Verify ESM build with node
        run: node -e "import('./dist/index.js').then(m => { if (typeof m.documentMarkdownReader === 'undefined') throw new Error('documentMarkdownReader export missing'); console.log('ESM build OK') })"

      - name: Verify CJS build with node
        run: node --input-type=commonjs -e "const m = require('./dist/index.cjs'); if (typeof m.documentMarkdownReader === 'undefined') throw new Error('documentMarkdownReader export missing'); console.log('CJS build OK')"
