name: Test

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup-matrix:
    name: Setup matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.setup-matrix.outputs.matrix }}


    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js matrix
        id: setup-matrix
        run: |
          # Get minimum supported major version from package.json.
          # The current toolchain supports active LTS majors, not odd-numbered current releases.
          MIN_VERSION=$(node -p "const engines = require('./package.json').engines?.node; const match = engines?.match(/\\d+/); if (!match) { throw new Error('Unable to determine the minimum supported Node.js version from package.json'); } match[0]")

          # Get supported LTS major versions from Node.js API
          LTS_MAJORS=$(curl -s https://nodejs.org/dist/index.json | jq -r '[.[] | select(.lts) | .version | ltrimstr(\"v\") | split(\".\")[0] | tonumber] | unique | .[]')

          VERSIONS=""
          while IFS= read -r version; do
            if (( version >= MIN_VERSION )); then
              VERSIONS="$VERSIONS\"$version\","
            fi
          done <<< "$LTS_MAJORS"
          # Remove trailing comma and wrap in brackets
          MATRIX="[${VERSIONS%,}]"

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  test:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 2
      matrix:
        node-version: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    name: Test with Node.js ${{ matrix.node-version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
