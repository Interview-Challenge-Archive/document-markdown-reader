name: Lint

permissions:
  contents: read

on:
  pull_request:
    paths-ignore:
      - '.gitattributes'
      - '.gitignore'
      - '.editorconfig'
      - '**.md'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: npm install

      - name: Run lint
        run: npm run lint
