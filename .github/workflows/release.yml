name: Release and Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-and-publish:
    name: Release and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0  # Fetch full history for PR detection
          fetch-tags: true

      - name: Get package info
        id: package_info
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NODE_VERSION=$(node -p "require('./package.json').engines?.node || '20'")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "node_version=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/${{ steps.package_info.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/setup-node@v6.3.0
        with:
          node-version: ${{ steps.package_info.outputs.node_version }}
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        if: steps.check_tag.outputs.exists == 'false'
        run: npm ci

      - name: Get latest release tag
        if: steps.check_tag.outputs.exists == 'false'
        id: last_tag
        uses: rmeneely/git-last-tag@v1
        with:
          tag_pattern: 'v[0-9]*.[0-9]*.[0-9]*'

      - name: Generate Release Notes
        if: steps.check_tag.outputs.exists == 'false' && steps.last_tag.outputs.last_tag != ''
        id: release_notes
        continue-on-error: true
        uses: mikepenz/release-changelog-builder-action@v6.1.1
        with:
          configuration: ".github/release-notes-config.json"
          fromTag: ${{ steps.last_tag.outputs.last_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: ncipollo/release-action@v1.21.0
        with:
          tag: ${{ steps.package_info.outputs.tag }}
          name: Release ${{ steps.package_info.outputs.tag }}
          body: ${{ steps.last_tag.outputs.last_tag != '' && steps.release_notes.outputs.changelog || format('Initial release for {0}.', steps.package_info.outputs.tag) }}
          draft: false
          prerelease: false

      - name: Publish to npm
        if: steps.check_tag.outputs.exists == 'false'
        run: npm publish --provenance
